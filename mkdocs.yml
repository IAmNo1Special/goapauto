site_name: goapauto
site_description: Strictly-typed Goal-Oriented Action Planning for Python.
site_url: https://github.com/IAmNo1Special/goapauto
repo_url: https://github.com/IAmNo1Special/goapauto
repo_name: IAmNo1Special/goapauto

theme:
  name: material
  features:
    - content.code.copy
    - content.tooltips
    - navigation.expand
    - navigation.sections
    - navigation.tabs # Tabs look premium
    - navigation.top
    - navigation.instant # SPA-like feel
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    # Default to Dark Mode (Super Dark/Slate)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black # Deep, premium look
      accent: cyan # Cyberpunk/Tech contrast
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

    # Fallback Light Mode (if user insists)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list

nav:
  - Home: index.md
  - User Guide:
      - Getting Started: user_guide/getting_started.md
      - Core Concepts: user_guide/core_concepts.md
  - Reference:
      - WorldState: reference/worldstate.md
      - Goal: reference/goal.md
      - Actions: reference/actions.md
      - Planner: reference/planner.md
      - Perception (Sensors/Arbitrator): reference/perception.md
      - Visualizer: reference/visualizer.md
